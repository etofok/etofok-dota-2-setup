  <h2>Abilities 1 - 4</h2>

  <div class="section-wrap-content">

    <p>
      Abilities 1 2 3 4 use the intuitive <kk>Q</kk><kk>W</kk><kk>E</kk><kk>R</kk> layout.<br>
      No changes here either.
    </p>

      <ul>
        <li><b>Abilities</b> <kk>Q</kk> <kk>W</kk> <kk>E</kk> <kk>R</kk> </li>
        <li><b>Abilities (Self)</b> <kk>Q</kk> <kk>W</kk> <kk>E</kk> <kk>R</kk> &nbsp; + &nbsp; <kk>Alt</kk></li>
        <li><b>Abilities (Learn)</b> <kk>Q</kk> <kk>W</kk> <kk>E</kk> <kk>R</kk> &nbsp; + &nbsp; <kk>Ctrl</kk></li>
      </ul>

    <div class="separator mt2"></div>

    <p class="mt2">

      <kk>Ctrl</kk> + <kk>Ability Key</kk> instantly levels up the ability.<br><br>

    </p>
